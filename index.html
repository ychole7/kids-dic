<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>꼬마 사전</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg1:#fff7e6; --bg2:#ffe0e9; --card:#ffffff;
    --pink:#ff7eb3; --purple:#9b8cff; --yellow:#ffcf4d; --green:#7ed957; --blue:#5cc8ff;
    --ink:#4a3b5c;
  }
  html,body{ height:100%; }
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink); min-height:100vh; overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
    padding:16px 14px 40px;
  }
  .title{
    font-size:30px; font-weight:900; margin:6px 0 2px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:-1px;
  }
  .subtitle{ font-size:13px; color:#a08bb5; margin-bottom:14px; }

  /* 캐릭터 */
  .mascot{ width:140px; height:140px; position:relative; margin-bottom:6px; transition:transform .3s; }
  .mascot.talk{ animation:bounce .5s ease infinite; }
  @keyframes bounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .mascot svg{ width:100%; height:100%; display:block; }
  /* 말할 때 입 벌리기 (모든 캐릭터 공통) */
  .mascot .mouth-closed{ display:block; }
  .mascot .mouth-open{ display:none; }
  .mascot.talk .mouth-closed{ display:none; }
  .mascot.talk .mouth-open{ display:block; }

  /* 캐릭터 바꾸기 버튼 */
  .char-btn{ background:#fff; border:2px solid #ffd6e3; color:#b58aa8; border-radius:14px;
    padding:6px 14px; font-weight:800; font-size:13px; cursor:pointer; margin-bottom:10px; }
  .char-btn:active{ transform:scale(.95); }

  /* 캐릭터 선택 모달 */
  .modal-bg{ position:fixed; inset:0; background:rgba(80,50,90,.45); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-bg.on{ display:flex; }
  .modal{ background:#fff; border-radius:26px; padding:20px; max-width:430px; width:100%;
    max-height:80vh; overflow-y:auto; box-shadow:0 20px 50px rgba(120,80,140,.3); }
  .modal h3{ text-align:center; font-size:20px; color:var(--purple); margin-bottom:4px; }
  .modal .mh-sub{ text-align:center; font-size:12px; color:#a08bb5; margin-bottom:16px; }
  .char-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .char-card{ background:#fff7fb; border:3px solid #ffe0ec; border-radius:18px; padding:8px 4px;
    cursor:pointer; text-align:center; transition:transform .1s; }
  .char-card:active{ transform:scale(.94); }
  .char-card.sel{ border-color:var(--pink); background:#fff0f6; box-shadow:0 4px 12px rgba(255,126,179,.3); }
  .char-card svg{ width:70px; height:70px; }
  .char-card .cname{ font-size:12px; font-weight:800; color:#7b6a8e; margin-top:2px; }
  .modal-close{ display:block; width:100%; margin-top:16px; border:none; border-radius:16px;
    background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; font-weight:800;
    font-size:16px; padding:13px; cursor:pointer; }

  /* 검색 */
  .searchbar{ width:100%; max-width:430px; display:flex; gap:8px; margin-bottom:8px; }
  .searchbar input{
    flex:1; border:3px solid #ffd6e3; border-radius:18px; padding:14px 16px;
    font-size:18px; font-weight:700; color:var(--ink); background:#fff; outline:none;
  }
  .searchbar input:focus{ border-color:var(--pink); }
  .btn{
    border:none; border-radius:18px; font-weight:800; cursor:pointer; color:#fff;
    font-size:16px; transition:transform .1s; }
  .btn:active{ transform:scale(.94); }
  .btn-go{ background:linear-gradient(135deg,var(--pink),var(--purple)); padding:0 20px; font-size:22px; }
  .btn-mic{ background:linear-gradient(135deg,var(--blue),var(--green)); padding:0 16px; font-size:22px; }
  .btn-mic.listening{ background:linear-gradient(135deg,#ff5e7e,#ff2d55); animation:pulse 1s ease infinite; }
  @keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

  .tabs{ display:flex; gap:8px; margin-bottom:12px; }
  .tab{ background:#fff; border:2px solid #ffd6e3; color:#b58aa8; border-radius:14px;
    padding:8px 18px; font-weight:800; font-size:14px; cursor:pointer; }
  .tab.on{ background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; border-color:transparent; }

  .panel{ width:100%; max-width:430px; }

  /* 결과 카드 */
  .card{
    background:var(--card); border-radius:26px; padding:22px 20px;
    box-shadow:0 12px 30px rgba(180,120,200,.18); margin-bottom:14px;
    animation:pop .35s ease; }
  @keyframes pop{ from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
  .word-row{ display:flex; align-items:center; gap:10px; margin-bottom:4px; flex-wrap:wrap; }
  .word{ font-size:30px; font-weight:900; color:var(--purple); }
  .word-emoji{ font-size:34px; }
  .speak{ margin-left:auto; background:var(--blue); width:46px; height:46px; border-radius:50%;
    border:none; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 4px 10px rgba(92,200,255,.5); }
  .speak:active{ transform:scale(.9); }
  .fav{ background:#fff; border:2px solid var(--yellow); width:46px; height:46px; border-radius:50%;
    font-size:22px; cursor:pointer; }
  .fav.on{ background:var(--yellow); }
  .mean{ font-size:19px; line-height:1.55; font-weight:600; margin:10px 0 14px; color:#5b4a6e; }
  .ex-box{ background:#fff5fa; border-radius:16px; padding:12px 14px; font-size:16px; line-height:1.5;
    border-left:5px solid var(--pink); }
  .ex-box b{ color:var(--pink); }
  .emojis{ font-size:30px; margin-top:12px; text-align:center; letter-spacing:6px; }

  .loading{ text-align:center; padding:30px; font-size:17px; font-weight:700; color:#b58aa8; }
  .dots::after{ content:'...'; animation:dots 1.2s steps(4) infinite; }
  @keyframes dots{ 0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'} }

  .empty{ text-align:center; color:#c0a8d0; padding:24px; font-size:15px; line-height:1.6; }

  /* 즐겨찾기 */
  .fav-item{ background:#fff; border-radius:18px; padding:14px 16px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px; box-shadow:0 6px 16px rgba(180,120,200,.12); }
  .fav-item .fe{ font-size:28px; }
  .fav-item .fw{ font-size:19px; font-weight:800; color:var(--purple); }
  .fav-item .fm{ font-size:12px; color:#a08bb5; }
  .fav-item .open{ margin-left:auto; background:var(--green); border:none; color:#fff;
    border-radius:12px; padding:8px 12px; font-weight:800; cursor:pointer; }
  .del{ background:#ffb3c1; border:none; color:#fff; width:34px; height:34px; border-radius:50%;
    font-size:16px; cursor:pointer; }

  .err{ background:#fff0f0; color:#e06666; border-radius:16px; padding:16px; font-weight:700;
    text-align:center; }
</style>
</head>
<body>
  <div class="title">🌈 꼬마 사전</div>
  <div class="subtitle">궁금한 낱말을 물어보세요!</div>

  <div class="mascot" id="mascot"></div>
  <button class="char-btn" onclick="openCharPicker()">🎨 친구 바꾸기</button>

  <div class="searchbar">
    <input id="q" type="text" placeholder="예) 무지개, 용기, 친구" autocomplete="off">
    <button class="btn btn-mic" id="micBtn" onclick="startVoice()" title="말로 찾기">🎤</button>
    <button class="btn btn-go" onclick="search()">🔍</button>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-s" onclick="showTab('s')">🔍 찾기</button>
    <button class="tab" id="tab-f" onclick="showTab('f')">⭐ 즐겨찾기</button>
  </div>

  <div class="panel" id="panel-s">
    <div id="result">
      <div class="empty">
        궁금한 낱말을 적고 🔍 를 눌러보세요!<br><br>
        친구가 쉽게 알려줄게요 🐾
      </div>
    </div>
  </div>

  <div class="panel" id="panel-f" style="display:none">
    <div id="favList"></div>
  </div>

  <!-- 캐릭터 선택 모달 -->
  <div class="modal-bg" id="charModal">
    <div class="modal">
      <h3>🎨 친구를 골라요</h3>
      <div class="mh-sub">읽어줄 친구를 골라주세요</div>
      <div class="char-grid" id="charGrid"></div>
      <button class="modal-close" onclick="closeCharPicker()">다 골랐어요</button>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const mascot = $('mascot');
let favs = JSON.parse(localStorage.getItem('kkoma_favs')||'[]');

/* ===== 캐릭터 10종 (SVG) =====
   각 캐릭터는 viewBox 0 0 140 140.
   입은 두 개: .mouth-closed (평소), .mouth-open (말할 때).
   공통 눈/볼은 헬퍼로 생성. */
function eyes(){ return `
  <ellipse class="eye" cx="56" cy="74" rx="6" ry="8" fill="#3d2f4d"/>
  <ellipse class="eye" cx="84" cy="74" rx="6" ry="8" fill="#3d2f4d"/>
  <circle cx="58" cy="71" r="2" fill="#fff"/>
  <circle cx="86" cy="71" r="2" fill="#fff"/>`; }
function cheeks(c='#ff9db4'){ return `
  <ellipse cx="46" cy="86" rx="8" ry="5" fill="${c}" opacity=".6"/>
  <ellipse cx="94" cy="86" rx="8" ry="5" fill="${c}" opacity=".6"/>`; }
function mouth(){ return `
  <path class="mouth-closed" d="M62 88 Q70 95 78 88" stroke="#3d2f4d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse class="mouth-open" cx="70" cy="91" rx="9" ry="7" fill="#ff7a93"/>`; }

const CHARS = [
  { id:'bear', name:'곰돌이', svg:`
    <ellipse cx="42" cy="34" rx="17" ry="17" fill="#f7c948"/><ellipse cx="42" cy="34" rx="8" ry="8" fill="#ffb6c9"/>
    <ellipse cx="98" cy="34" rx="17" ry="17" fill="#f7c948"/><ellipse cx="98" cy="34" rx="8" ry="8" fill="#ffb6c9"/>
    <ellipse cx="70" cy="72" rx="50" ry="48" fill="#ffd44d"/>
    ${eyes()}${cheeks()}${mouth()}` },

  { id:'labrador', name:'강아지', svg:`
    <ellipse cx="34" cy="58" rx="16" ry="28" fill="#e9b870"/>
    <ellipse cx="106" cy="58" rx="16" ry="28" fill="#e9b870"/>
    <ellipse cx="70" cy="70" rx="48" ry="46" fill="#f5d9a8"/>
    <ellipse cx="70" cy="84" rx="24" ry="18" fill="#fff4e2"/>
    ${eyes()}${cheeks('#f0a878')}
    <ellipse cx="70" cy="80" rx="7" ry="5" fill="#5b4636"/>
    <path class="mouth-closed" d="M70 85 L70 92 M70 92 Q62 96 56 92 M70 92 Q78 96 84 92" stroke="#7a5c44" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="95" rx="8" ry="6" fill="#ff7a93"/>` },

  { id:'cat', name:'고양이', svg:`
    <path d="M36 50 L30 22 L56 40 Z" fill="#bda4e0"/><path d="M104 50 L110 22 L84 40 Z" fill="#bda4e0"/>
    <path d="M38 48 L34 30 L52 42 Z" fill="#ffc2d6"/><path d="M102 48 L106 30 L88 42 Z" fill="#ffc2d6"/>
    <ellipse cx="70" cy="74" rx="48" ry="44" fill="#cbb4e8"/>
    ${eyes()}${cheeks()}
    <path d="M70 80 l-4 4 M70 80 l4 4" stroke="#3d2f4d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path class="mouth-closed" d="M62 88 Q70 94 78 88" stroke="#3d2f4d" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="91" rx="8" ry="6" fill="#ff7a93"/>
    <line x1="20" y1="72" x2="44" y2="74" stroke="#9b8cce" stroke-width="2"/><line x1="20" y1="80" x2="44" y2="80" stroke="#9b8cce" stroke-width="2"/>
    <line x1="120" y1="72" x2="96" y2="74" stroke="#9b8cce" stroke-width="2"/><line x1="120" y1="80" x2="96" y2="80" stroke="#9b8cce" stroke-width="2"/>` },

  { id:'rabbit', name:'토끼', svg:`
    <ellipse cx="54" cy="28" rx="11" ry="26" fill="#fff"/><ellipse cx="54" cy="28" rx="5" ry="18" fill="#ffc2d6"/>
    <ellipse cx="86" cy="28" rx="11" ry="26" fill="#fff"/><ellipse cx="86" cy="28" rx="5" ry="18" fill="#ffc2d6"/>
    <ellipse cx="70" cy="76" rx="46" ry="44" fill="#fff"/>
    ${eyes()}${cheeks()}
    <ellipse cx="70" cy="82" rx="5" ry="4" fill="#ff9db4"/>
    ${mouth()}` },

  { id:'panda', name:'판다', svg:`
    <circle cx="40" cy="38" r="16" fill="#3d3d3d"/><circle cx="100" cy="38" r="16" fill="#3d3d3d"/>
    <ellipse cx="70" cy="74" rx="50" ry="47" fill="#fff"/>
    <ellipse cx="56" cy="72" rx="13" ry="16" fill="#3d3d3d"/><ellipse cx="84" cy="72" rx="13" ry="16" fill="#3d3d3d"/>
    <ellipse cx="56" cy="74" rx="6" ry="8" fill="#fff"/><ellipse cx="84" cy="74" rx="6" ry="8" fill="#fff"/>
    <circle cx="56" cy="74" r="3" fill="#222"/><circle cx="84" cy="74" r="3" fill="#222"/>
    <ellipse cx="70" cy="88" rx="6" ry="4" fill="#3d3d3d"/>
    <path class="mouth-closed" d="M62 96 Q70 101 78 96" stroke="#3d3d3d" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="98" rx="8" ry="6" fill="#ff7a93"/>` },

  { id:'fox', name:'여우', svg:`
    <path d="M34 48 L26 20 L58 42 Z" fill="#ff9248"/><path d="M106 48 L114 20 L82 42 Z" fill="#ff9248"/>
    <path d="M36 46 L32 28 L52 42 Z" fill="#fff"/><path d="M104 46 L108 28 L88 42 Z" fill="#fff"/>
    <ellipse cx="70" cy="68" rx="48" ry="44" fill="#ff9248"/>
    <path d="M70 70 Q44 84 70 116 Q96 84 70 70Z" fill="#fff"/>
    ${eyes()}${cheeks('#ffb37a')}
    <ellipse cx="70" cy="90" rx="6" ry="4" fill="#3d2f4d"/>
    ${mouth()}` },

  { id:'chick', name:'병아리', svg:`
    <ellipse cx="70" cy="74" rx="48" ry="46" fill="#ffe14d"/>
    <path d="M62 94 L70 104 L78 94 Z" fill="#ff9248"/>
    ${eyes()}${cheeks('#ffba7a')}
    <path d="M52 36 Q70 22 88 36" stroke="#ffd11a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="100" rx="7" ry="5" fill="#ff7a93"/>` },

  { id:'pig', name:'돼지', svg:`
    <path d="M44 38 L40 24 L58 36 Z" fill="#ffb3c8"/><path d="M96 38 L100 24 L82 36 Z" fill="#ffb3c8"/>
    <ellipse cx="70" cy="76" rx="48" ry="45" fill="#ffc2d6"/>
    ${eyes()}${cheeks('#ff9db4')}
    <ellipse cx="70" cy="86" rx="15" ry="11" fill="#ff9db4"/>
    <circle cx="64" cy="86" r="3" fill="#d97a93"/><circle cx="76" cy="86" r="3" fill="#d97a93"/>
    <path class="mouth-closed" d="M60 100 Q70 105 80 100" stroke="#d97a93" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="102" rx="8" ry="5" fill="#ff7a93"/>` },

  { id:'frog', name:'개구리', svg:`
    <circle cx="46" cy="36" r="16" fill="#8fd14f"/><circle cx="94" cy="36" r="16" fill="#8fd14f"/>
    <circle cx="46" cy="36" r="8" fill="#fff"/><circle cx="94" cy="36" r="8" fill="#fff"/>
    <circle cx="46" cy="38" r="4" fill="#3d2f4d"/><circle cx="94" cy="38" r="4" fill="#3d2f4d"/>
    <ellipse cx="70" cy="80" rx="50" ry="42" fill="#8fd14f"/>
    <ellipse cx="70" cy="92" rx="30" ry="16" fill="#b6e88a"/>
    ${cheeks('#7ab33f')}
    <path class="mouth-closed" d="M52 90 Q70 102 88 90" stroke="#5a8c2f" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse class="mouth-open" cx="70" cy="94" rx="14" ry="8" fill="#ff7a93"/>` },

  { id:'penguin', name:'펭귄', svg:`
    <ellipse cx="70" cy="74" rx="46" ry="48" fill="#3d4654"/>
    <ellipse cx="70" cy="82" rx="32" ry="38" fill="#fff"/>
    ${eyes()}
    <path d="M62 84 L70 92 L78 84 Z" fill="#ff9248"/>
    <ellipse cx="50" cy="80" rx="6" ry="4" fill="#ffb37a" opacity=".6"/><ellipse cx="90" cy="80" rx="6" ry="4" fill="#ffb37a" opacity=".6"/>
    <ellipse class="mouth-open" cx="70" cy="98" rx="7" ry="5" fill="#ff7a93"/>` },
];

let charId = localStorage.getItem('kkoma_char') || 'bear';

function renderMascot(){
  const c = CHARS.find(x=>x.id===charId) || CHARS[0];
  mascot.innerHTML = `<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${c.svg}</svg>`;
}

function openCharPicker(){
  stopSpeak();
  $('charGrid').innerHTML = CHARS.map(c=>`
    <div class="char-card ${c.id===charId?'sel':''}" onclick="pickChar('${c.id}')">
      <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${c.svg}</svg>
      <div class="cname">${c.name}</div>
    </div>`).join('');
  $('charModal').classList.add('on');
}
function pickChar(id){
  charId = id;
  localStorage.setItem('kkoma_char', id);
  renderMascot();
  // 선택 표시 갱신
  document.querySelectorAll('.char-card').forEach(el=>el.classList.remove('sel'));
  $('charGrid').querySelector(`[onclick="pickChar('${id}')"]`)?.classList.add('sel');
  // 고른 친구가 짧게 인사
  const c = CHARS.find(x=>x.id===id);
  speak(`안녕! 나는 ${c.name}야`);
}
function closeCharPicker(){ stopSpeak(); $('charModal').classList.remove('on'); }

function showTab(t){
  stopSpeak(); // 탭 바꾸면 읽기 멈춤
  $('tab-s').classList.toggle('on', t==='s');
  $('tab-f').classList.toggle('on', t==='f');
  $('panel-s').style.display = t==='s'?'block':'none';
  $('panel-f').style.display = t==='f'?'block':'none';
  if(t==='f') renderFavs();
  else resetSearch(); // 찾기 탭으로 오면 초기화
}

// 찾기 화면 초기화 (검색창 비우고 안내문 표시)
function resetSearch(){
  $('q').value = '';
  $('result').innerHTML = `
    <div class="empty">
      궁금한 낱말을 적고 🔍 를 눌러보세요!<br><br>
      곰돌이가 쉽게 알려줄게요 🐻
    </div>`;
}

$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') search(); });

// 🎤 말로 찾기 (음성 인식)
function startVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert('이 브라우저에서는 말로 찾기가 안 돼요. 사파리나 크롬에서 열어주세요!');
    return;
  }
  stopSpeak(); // 곰돌이가 읽는 중이면 멈춤
  const rec = new SR();
  rec.lang = 'ko-KR';
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  const mic = $('micBtn');
  mic.classList.add('listening');
  mic.textContent = '👂';

  rec.onresult = (e)=>{
    let word = (e.results[0][0].transcript||'').trim();
    word = word.replace(/[.?!,]/g,'').trim(); // 끝의 문장부호 제거
    if(word){ $('q').value = word; search(); }
  };
  rec.onerror = ()=>{ /* 무음/취소 등은 조용히 넘어감 */ };
  rec.onend = ()=>{ mic.classList.remove('listening'); mic.textContent='🎤'; };

  try{ rec.start(); }catch(err){ mic.classList.remove('listening'); mic.textContent='🎤'; }
}

async function search(){
  const word = $('q').value.trim();
  if(!word) return;
  $('result').innerHTML = '<div class="loading">곰돌이가 생각하고 있어요 <span class="dots"></span></div>';

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ word })
    });
    const data = await res.json();

    // 서버가 에러를 준 경우
    if(!res.ok || data.error){
      console.error('server error:', data);
      $('result').innerHTML = '<div class="err">앗! 곰돌이가 잠깐 졸았어요 😴<br>다시 한 번 눌러주세요.</div>';
      return;
    }

    // 서버가 이미 파싱한 객체(word, meaning...)를 그대로 보냄
    renderResult(data);
  }catch(e){
    console.error('error:', e);
    $('result').innerHTML = '<div class="err">앗! 곰돌이가 잠깐 졸았어요 😴<br>다시 한 번 눌러주세요.</div>';
  }
}

function renderResult(d, silent){
  const isFav = favs.some(f=>f.word===d.word);
  $('result').innerHTML = `
    <div class="card">
      <div class="word-row">
        <span class="word-emoji">${d.emoji||'📖'}</span>
        <span class="word">${d.word}</span>
        <button class="fav ${isFav?'on':''}" id="favBtn" onclick='toggleFav(${JSON.stringify(d).replace(/'/g,"&#39;")})'>${isFav?'⭐':'☆'}</button>
        <button class="speak" id="speakBtn" onclick='toggleSpeak(${JSON.stringify(d.word+". "+d.meaning).replace(/'/g,"&#39;")})'>🔊</button>
      </div>
      <div class="mean">${d.meaning||''}</div>
      ${d.example?`<div class="ex-box"><b>이렇게 써요:</b> ${d.example}</div>`:''}
      ${d.emojis?`<div class="emojis">${d.emojis}</div>`:''}
    </div>`;
  if(!silent && d.meaning && !d.meaning.includes('잘 모르겠어요'))
    speak(d.word+". "+d.meaning);
}

function setSpeakIcon(speaking){
  const b = $('speakBtn');
  if(b) b.textContent = speaking ? '⏸️' : '🔊';
}

function stopSpeak(){
  if('speechSynthesis' in window) speechSynthesis.cancel();
  mascot.classList.remove('talk');
  setSpeakIcon(false);
}

// 🔊 버튼: 읽는 중이면 멈춤, 아니면 읽기 (토글)
function toggleSpeak(text){
  if(speechSynthesis.speaking){ stopSpeak(); return; }
  speak(text);
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.9; u.pitch=1.25;
  const ko = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ko'));
  if(ko) u.voice=ko;
  mascot.classList.add('talk');
  setSpeakIcon(true);
  u.onend = ()=>{ mascot.classList.remove('talk'); setSpeakIcon(false); };
  u.oncancel = ()=>{ mascot.classList.remove('talk'); setSpeakIcon(false); };
  speechSynthesis.speak(u);
}

function toggleFav(d){
  const i = favs.findIndex(f=>f.word===d.word);
  if(i>=0) favs.splice(i,1);
  else favs.unshift({word:d.word, emoji:d.emoji, meaning:d.meaning, example:d.example, emojis:d.emojis});
  localStorage.setItem('kkoma_favs', JSON.stringify(favs));
  const btn = $('favBtn');
  if(btn){ const on=favs.some(f=>f.word===d.word); btn.classList.toggle('on',on); btn.textContent=on?'⭐':'☆'; }
}

function renderFavs(){
  if(favs.length===0){
    $('favList').innerHTML = '<div class="empty">아직 즐겨찾기한 낱말이 없어요.<br><br>마음에 드는 낱말에 ☆ 를 눌러보세요! ⭐</div>';
    return;
  }
  $('favList').innerHTML = favs.map((f,i)=>`
    <div class="fav-item">
      <span class="fe">${f.emoji||'📖'}</span>
      <div>
        <div class="fw">${f.word}</div>
        <div class="fm">${(f.meaning||'').slice(0,20)}...</div>
      </div>
      <button class="open" onclick='openFav(${i})'>보기</button>
      <button class="del" onclick='delFav(${i})'>✕</button>
    </div>`).join('');
}

function openFav(i){
  const d = favs[i];
  showTab('s');        // 먼저 탭 이동 (여기서 초기화됨)
  renderResult(d, true); // 그 다음 단어 표시 (자동읽기 끔)
  $('q').value = d.word;
}
function delFav(i){
  favs.splice(i,1);
  localStorage.setItem('kkoma_favs', JSON.stringify(favs));
  renderFavs();
}

if('speechSynthesis' in window) speechSynthesis.getVoices();
renderMascot(); // 저장된 캐릭터로 시작
</script>
</body>
</html>
