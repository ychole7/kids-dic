<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>꼬마 사전</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg1:#fff7e6; --bg2:#ffe0e9; --card:#ffffff;
    --pink:#ff7eb3; --purple:#9b8cff; --yellow:#ffcf4d; --green:#7ed957; --blue:#5cc8ff;
    --ink:#4a3b5c;
  }
  html,body{ height:100%; }
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink); min-height:100vh; overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
    padding:16px 14px 40px;
  }
  .title{
    font-size:30px; font-weight:900; margin:6px 0 2px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:-1px;
  }
  .subtitle{ font-size:13px; color:#a08bb5; margin-bottom:14px; }

  /* 캐릭터 */
  .mascot{ width:130px; height:130px; position:relative; margin-bottom:6px; transition:transform .3s; }
  .mascot.talk{ animation:bounce .5s ease infinite; }
  @keyframes bounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .body-c{ position:absolute; left:15px; top:25px; width:100px; height:95px;
    background:radial-gradient(circle at 35% 30%,#ffe9a8,var(--yellow)); border-radius:50% 50% 46% 46%;
    box-shadow:0 8px 20px rgba(255,150,80,.35); }
  .ear{ position:absolute; width:34px; height:34px; background:var(--yellow); border-radius:50%; top:14px; }
  .ear.l{ left:14px; } .ear.r{ right:14px; }
  .ear i{ position:absolute; inset:9px; background:#ffb6c9; border-radius:50%; }
  .eye{ position:absolute; width:15px; height:18px; background:#4a3b5c; border-radius:50%; top:58px; }
  .eye.l{ left:48px; } .eye.r{ right:48px; }
  .eye::after{ content:''; position:absolute; width:5px; height:5px; background:#fff; border-radius:50%; top:3px; left:3px; }
  .cheek{ position:absolute; width:16px; height:11px; background:#ff9db4; border-radius:50%; top:78px; opacity:.7; }
  .cheek.l{ left:36px; } .cheek.r{ right:36px; }
  .mouth{ position:absolute; left:50%; transform:translateX(-50%); top:84px;
    width:22px; height:11px; border-bottom:4px solid #4a3b5c; border-radius:0 0 40px 40px; }
  .mascot.talk .mouth{ height:18px; width:26px; background:#ff8fa3; border:none; border-radius:50%; }

  /* 검색 */
  .searchbar{ width:100%; max-width:430px; display:flex; gap:8px; margin-bottom:8px; }
  .searchbar input{
    flex:1; border:3px solid #ffd6e3; border-radius:18px; padding:14px 16px;
    font-size:18px; font-weight:700; color:var(--ink); background:#fff; outline:none;
  }
  .searchbar input:focus{ border-color:var(--pink); }
  .btn{
    border:none; border-radius:18px; font-weight:800; cursor:pointer; color:#fff;
    font-size:16px; transition:transform .1s; }
  .btn:active{ transform:scale(.94); }
  .btn-go{ background:linear-gradient(135deg,var(--pink),var(--purple)); padding:0 20px; font-size:22px; }

  .tabs{ display:flex; gap:8px; margin-bottom:12px; }
  .tab{ background:#fff; border:2px solid #ffd6e3; color:#b58aa8; border-radius:14px;
    padding:8px 18px; font-weight:800; font-size:14px; cursor:pointer; }
  .tab.on{ background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; border-color:transparent; }

  .panel{ width:100%; max-width:430px; }

  /* 결과 카드 */
  .card{
    background:var(--card); border-radius:26px; padding:22px 20px;
    box-shadow:0 12px 30px rgba(180,120,200,.18); margin-bottom:14px;
    animation:pop .35s ease; }
  @keyframes pop{ from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
  .word-row{ display:flex; align-items:center; gap:10px; margin-bottom:4px; flex-wrap:wrap; }
  .word{ font-size:30px; font-weight:900; color:var(--purple); }
  .word-emoji{ font-size:34px; }
  .speak{ margin-left:auto; background:var(--blue); width:46px; height:46px; border-radius:50%;
    border:none; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 4px 10px rgba(92,200,255,.5); }
  .speak:active{ transform:scale(.9); }
  .fav{ background:#fff; border:2px solid var(--yellow); width:46px; height:46px; border-radius:50%;
    font-size:22px; cursor:pointer; }
  .fav.on{ background:var(--yellow); }
  .mean{ font-size:19px; line-height:1.55; font-weight:600; margin:10px 0 14px; color:#5b4a6e; }
  .ex-box{ background:#fff5fa; border-radius:16px; padding:12px 14px; font-size:16px; line-height:1.5;
    border-left:5px solid var(--pink); }
  .ex-box b{ color:var(--pink); }
  .emojis{ font-size:30px; margin-top:12px; text-align:center; letter-spacing:6px; }

  .loading{ text-align:center; padding:30px; font-size:17px; font-weight:700; color:#b58aa8; }
  .dots::after{ content:'...'; animation:dots 1.2s steps(4) infinite; }
  @keyframes dots{ 0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'} }

  .empty{ text-align:center; color:#c0a8d0; padding:24px; font-size:15px; line-height:1.6; }

  /* 즐겨찾기 */
  .fav-item{ background:#fff; border-radius:18px; padding:14px 16px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px; box-shadow:0 6px 16px rgba(180,120,200,.12); }
  .fav-item .fe{ font-size:28px; }
  .fav-item .fw{ font-size:19px; font-weight:800; color:var(--purple); }
  .fav-item .fm{ font-size:12px; color:#a08bb5; }
  .fav-item .open{ margin-left:auto; background:var(--green); border:none; color:#fff;
    border-radius:12px; padding:8px 12px; font-weight:800; cursor:pointer; }
  .del{ background:#ffb3c1; border:none; color:#fff; width:34px; height:34px; border-radius:50%;
    font-size:16px; cursor:pointer; }

  .err{ background:#fff0f0; color:#e06666; border-radius:16px; padding:16px; font-weight:700;
    text-align:center; }
</style>
</head>
<body>
  <div class="title">🌈 꼬마 사전</div>
  <div class="subtitle">궁금한 낱말을 물어보세요!</div>

  <div class="mascot" id="mascot">
    <div class="ear l"><i></i></div>
    <div class="ear r"><i></i></div>
    <div class="body-c"></div>
    <div class="eye l"></div>
    <div class="eye r"></div>
    <div class="cheek l"></div>
    <div class="cheek r"></div>
    <div class="mouth"></div>
  </div>

  <div class="searchbar">
    <input id="q" type="text" placeholder="예) 무지개, 용기, 친구" autocomplete="off">
    <button class="btn btn-go" onclick="search()">🔍</button>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-s" onclick="showTab('s')">🔍 찾기</button>
    <button class="tab" id="tab-f" onclick="showTab('f')">⭐ 즐겨찾기</button>
  </div>

  <div class="panel" id="panel-s">
    <div id="result">
      <div class="empty">
        궁금한 낱말을 적고 🔍 를 눌러보세요!<br><br>
        곰돌이가 쉽게 알려줄게요 🐻
      </div>
    </div>
  </div>

  <div class="panel" id="panel-f" style="display:none">
    <div id="favList"></div>
  </div>

<script>
const $ = id => document.getElementById(id);
const mascot = $('mascot');
let favs = JSON.parse(localStorage.getItem('kkkoma_favs')||'[]');

function showTab(t){
  $('tab-s').classList.toggle('on', t==='s');
  $('tab-f').classList.toggle('on', t==='f');
  $('panel-s').style.display = t==='s'?'block':'none';
  $('panel-f').style.display = t==='f'?'block':'none';
  if(t==='f') renderFavs();
}

$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') search(); });

async function search(){
  const word = $('q').value.trim();
  if(!word) return;
  $('result').innerHTML = '<div class="loading">곰돌이가 생각하고 있어요 <span class="dots"></span></div>';

  const prompt = `너는 5~6세 유치원 아이에게 낱말을 설명해주는 친절한 곰돌이 선생님이야.
아이가 "${word}" 라는 낱말의 뜻을 물어봤어.

아주 쉽고 따뜻한 말로 설명해줘. 어려운 단어는 절대 쓰지 마.
아래 JSON 형식으로만 답해. 다른 말, 마크다운, 백틱은 절대 쓰지 마.

{
  "word": "${word}",
  "emoji": "낱말을 가장 잘 나타내는 이모지 1개",
  "meaning": "5~6세 아이도 이해할 수 있는 1~2문장 설명. 존댓말. 따뜻하게.",
  "example": "이 낱말을 쓴 짧고 쉬운 예문 1개. 아이 일상 속 상황.",
  "emojis": "낱말과 관련된 이모지 4~5개를 한 줄로"
}

만약 "${word}"가 낱말이 아니거나 아이에게 부적절하면 meaning에 "음~ 그건 곰돌이도 잘 모르겠어요! 다른 낱말을 물어봐 줄래요?" 라고 넣고 나머지는 빈 칸으로 둬.`;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data = await res.json();
    let txt = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    txt = txt.replace(/```json|```/g,'').trim();
    const d = JSON.parse(txt);
    renderResult(d);
  }catch(e){
    $('result').innerHTML = '<div class="err">앗! 곰돌이가 잠깐 졸았어요 😴<br>다시 한 번 눌러주세요.</div>';
  }
}

function renderResult(d){
  const isFav = favs.some(f=>f.word===d.word);
  $('result').innerHTML = `
    <div class="card">
      <div class="word-row">
        <span class="word-emoji">${d.emoji||'📖'}</span>
        <span class="word">${d.word}</span>
        <button class="fav ${isFav?'on':''}" id="favBtn" onclick='toggleFav(${JSON.stringify(d).replace(/'/g,"&#39;")})'>${isFav?'⭐':'☆'}</button>
        <button class="speak" onclick='speak(${JSON.stringify(d.word+". "+d.meaning).replace(/'/g,"&#39;")})'>🔊</button>
      </div>
      <div class="mean">${d.meaning||''}</div>
      ${d.example?`<div class="ex-box"><b>이렇게 써요:</b> ${d.example}</div>`:''}
      ${d.emojis?`<div class="emojis">${d.emojis}</div>`:''}
    </div>`;
  if(d.meaning && !d.meaning.includes('잘 모르겠어요'))
    speak(d.word+". "+d.meaning);
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.9; u.pitch=1.25;
  const ko = speechSynthesis.getVoices().find(v=>v.lang.startsWith('ko'));
  if(ko) u.voice=ko;
  mascot.classList.add('talk');
  u.onend = ()=> mascot.classList.remove('talk');
  speechSynthesis.speak(u);
}

function toggleFav(d){
  const i = favs.findIndex(f=>f.word===d.word);
  if(i>=0) favs.splice(i,1);
  else favs.unshift({word:d.word, emoji:d.emoji, meaning:d.meaning, example:d.example, emojis:d.emojis});
  localStorage.setItem('kkoma_favs', JSON.stringify(favs));
  const btn = $('favBtn');
  if(btn){ const on=favs.some(f=>f.word===d.word); btn.classList.toggle('on',on); btn.textContent=on?'⭐':'☆'; }
}

function renderFavs(){
  if(favs.length===0){
    $('favList').innerHTML = '<div class="empty">아직 즐겨찾기한 낱말이 없어요.<br><br>마음에 드는 낱말에 ☆ 를 눌러보세요! ⭐</div>';
    return;
  }
  $('favList').innerHTML = favs.map((f,i)=>`
    <div class="fav-item">
      <span class="fe">${f.emoji||'📖'}</span>
      <div>
        <div class="fw">${f.word}</div>
        <div class="fm">${(f.meaning||'').slice(0,20)}...</div>
      </div>
      <button class="open" onclick='openFav(${i})'>보기</button>
      <button class="del" onclick='delFav(${i})'>✕</button>
    </div>`).join('');
}

function openFav(i){
  const d = favs[i];
  showTab('s');
  renderResult(d);
  $('q').value = d.word;
}
function delFav(i){
  favs.splice(i,1);
  localStorage.setItem('kkoma_favs', JSON.stringify(favs));
  renderFavs();
}

if('speechSynthesis' in window) speechSynthesis.getVoices();
</script>
</body>
</html>
